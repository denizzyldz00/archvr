# vr-web'i her main push'unda derleyip gh-pages dalına yayınlar.
# GitHub Pages gh-pages dalından servis eder (HTTPS'i Pages sağlar — WebXR şartı).
# Adres: https://denizzyldz00.github.io/archvr/
#
# NOT: Bu public repoda yalnız site kaynağı (shared + vr-web + docs) bulunur;
# desktop uygulaması AYRI ÖZEL repodadır (yerel klasörde desktop/ olarak durur,
# buraya girmez). Bu yüzden lockfile yerine `npm install --no-package-lock`
# kullanılır: kök package-lock.json yerelde desktop bağımlılıklarını da içerir,
# desktop klasörü burada olmadığından `npm ci` uyumsuzluk hatası verirdi.
name: vr-web GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-package-lock
      - run: npm run build:shared
      - run: npm run build:vr
      # Jekyll işlemesini kapat (assets/ klasörü olduğu gibi sunulsun)
      - run: touch vr-web/dist/.nojekyll
      - name: gh-pages dalına yayınla
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: vr-web/dist
